      stroke="#4a90e2" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="0.6" y="2.5" width="18.8" height="15" rx="2" stroke="#1d3a60" stroke-width="1.1" fill="none"/>
    <rect x="0.6" y="2.5" width="18.8" height="4.2" rx="2" fill="#112040"/>
    <rect x="0.6" y="5" width="18.8" height="1.7" fill="#112040"/>
    <!-- Остальная часть — поверх обводки -->
    <polyline points="5,13 8.5,14.5 12,10 15,7.5 19.4,3.5"
      stroke="#4a90e2" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>

</svg>
