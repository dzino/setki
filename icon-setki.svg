<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <clipPath id="tableClip">
      <rect x="18" y="32" width="144" height="116" rx="5"/>
    </clipPath>
  </defs>

  <!-- Background: brand blue -->
  <rect width="180" height="180" fill="#1a6cf4" rx="22"/>

  <g clip-path="url(#tableClip)">

    <!-- Table body: white -->
    <rect x="18" y="32" width="144" height="116" fill="#ffffff"/>

    <!-- Header row: dark blue -->
    <rect x="18" y="32" width="144" height="20" fill="#0a2a6e"/>

    <!-- Alternating row tints -->
    <rect x="18" y="72"  width="144" height="20" fill="#eef4ff"/>
    <rect x="18" y="112" width="144" height="20" fill="#eef4ff"/>

    <!-- Column dividers -->
    <line x1="54"  y1="32" x2="54"  y2="148" stroke="#c0d4f0" stroke-width="1"/>
    <line x1="90"  y1="32" x2="90"  y2="148" stroke="#c0d4f0" stroke-width="1"/>
    <line x1="126" y1="32" x2="126" y2="148" stroke="#c0d4f0" stroke-width="1"/>

    <!-- Row dividers -->
    <line x1="18" y1="52"  x2="162" y2="52"  stroke="#c0d4f0" stroke-width="1"/>
    <line x1="18" y1="72"  x2="162" y2="72"  stroke="#c0d4f0" stroke-width="1"/>
    <line x1="18" y1="92"  x2="162" y2="92"  stroke="#c0d4f0" stroke-width="1"/>
    <line x1="18" y1="112" x2="162" y2="112" stroke="#c0d4f0" stroke-width="1"/>
    <line x1="18" y1="132" x2="162" y2="132" stroke="#c0d4f0" stroke-width="1"/>

    <!-- Data stubs -->
    <rect x="22"  y="58" width="24" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="58"  y="58" width="18" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="94"  y="58" width="22" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="130" y="58" width="18" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>

    <rect x="22"  y="78" width="20" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="58"  y="78" width="26" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="94"  y="78" width="14" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="130" y="78" width="20" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>

    <rect x="22"  y="98" width="26" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="58"  y="98" width="16" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="94"  y="98" width="22" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="130" y="98" width="16" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>

    <rect x="22"  y="118" width="18" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="58"  y="118" width="24" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="94"  y="118" width="16" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="130" y="118" width="20" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>

    <rect x="22"  y="138" width="22" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="58"  y="138" width="18" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="94"  y="138" width="24" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>
    <rect x="130" y="138" width="14" height="5" fill="#1a6cf4" rx="1.5" opacity="0.6"/>

    <!-- Sparkline area fill -->
    <polygon
      points="18,145 44,129 70,135 95,110 117,118 140,88 162,64 162,148 18,148"
      fill="#1a6cf4" opacity="0.15"/>

    <!-- Sparkline main: dark blue on white table -->
    <polyline
      points="18,145 44,129 70,135 95,110 117,118 140,88 162,64"
      fill="none" stroke="#0a2a6e" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points: dark blue -->
    <circle cx="44"  cy="129" r="3"   fill="#1a6cf4"/>
    <circle cx="70"  cy="135" r="3"   fill="#1a6cf4"/>
    <circle cx="95"  cy="110" r="3.5" fill="#1a6cf4"/>
    <circle cx="117" cy="118" r="3"   fill="#1a6cf4"/>
    <circle cx="140" cy="88"  r="3.5" fill="#1a6cf4"/>

    <!-- Terminal point -->
    <circle cx="162" cy="64" r="8"   fill="#1a6cf4" opacity="0.2"/>
    <circle cx="162" cy="64" r="4.5" fill="#0a2a6e"/>

  </g>

  <!-- Table border -->
  <rect x="18" y="32" width="144" height="116" fill="none" stroke="#0a2a6e" stroke-width="1.5" rx="5" opacity="0.3"/>

</svg>
