<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Exact icon from TreeGridFooter.tsx footer brand label, unchanged. Canvas outside the
       table border is transparent; only the table body itself is filled white. -->
  <svg x="20" y="36" width="160" height="128" viewBox="0 2 20 16" xmlns="http://www.w3.org/2000/svg">
    <rect x="0.6" y="2.5" width="18.8" height="15" rx="2" fill="#ffffff"/>
    <line x1="6.87" y1="6.7" x2="6.87" y2="17.5" stroke="#c0cdd9" stroke-width="0.7"/>
    <line x1="13.13" y1="6.7" x2="13.13" y2="17.5" stroke="#c0cdd9" stroke-width="0.7"/>
    <line x1="0.6" y1="10.3" x2="19.4" y2="10.3" stroke="#c0cdd9" stroke-width="0.7"/>
    <line x1="0.6" y1="13.9" x2="19.4" y2="13.9" stroke="#c0cdd9" stroke-width="0.7"/>
    <!-- Начало спарклайна — под обводкой таблицы (выходит из-под угла) -->
